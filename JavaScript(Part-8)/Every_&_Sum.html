<!-- #Every(very similar to logical AND operator)( for every elment of array ke liye check krta h,ye do value return krta h true ya false,agr sb every element function ki true return krega to ye  every bhi true dega or agr ek bhi false de diya element ne to false return kr deta hmara every bhi):Returns true if element of array gives true for some function.Else returns false.
arr.every(some function definition or name);

Example:
[1,2,3,4].every ((el)=>(el%2==0));
false
[2,4].every( (el)=>(el%2==0));
true

#Some(very similar to logical OR operator):Returns true id some elements of array give true for some function.Else returns false.
arr.some(some function definition or name);
Example:
[1,2,3,4].some((el)=>(el%2==0));
true
[1,3].some((el)=>(el%2==0));
false 


Note-some and every=> both gives only one value ya to true ya to false-->
