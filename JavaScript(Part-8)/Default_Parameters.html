<!-- #Default(default parameter hmesha last me hona chaiye ex->a,b=2) Parameters:Giving a default value to the arguments.
Syntax:
function func(a,b=2){
    //do something
}
Example:
function sum(a,b=3){
    return a+b;
} 
    
Note-hmesha default parameter hm ending me hi bnaate h ex-a,b=5(here b is a default parameter)
 Agar argument pass nahi hota,
  to default value use hoti hai.-->
