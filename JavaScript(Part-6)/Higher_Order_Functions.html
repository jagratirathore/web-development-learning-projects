<!-- #Higher Order Functions(ek ya ek se jada fuctions ko as a arguments lete h): A function that does one or both:
~takes one or multiple functions as arguments
~returns a function

#Takes one or multiple fuctions as arguments-

#example-greet means(hello ,namste)->multiple times bolte h,n times multiple greet ko print kr vaana
function multipleGreet(func, n){
    for(let i=1; i<=n; i++){
        func();
    }
}
let greet=function(){
    console.log("hello");
}
multipleGreet(greet,2); -->
