Breakpoints ka use debugging ke liye hota hai.
Jab code bada hota hai ya hume doubt hota hai ki koi particular line kaise execute ho rahi hai,
to hum us line par breakpoint laga dete hain.

Breakpoint lagane ke baad code execution us line par temporarily stop ho jata hai,
jisse hum step-by-step code ko run karke samajh sakte hain.

Debugging ka matlab hota hai code me error ya problem ko identify karna aur fix karna.

Browser ke Developer Tools (DevTools) ki help se hum:
- Breakpoints laga sakte hain
- Code ko line by line execute kar sakte hain (step over, step into, step out)
- Call Stack ko dekh sakte hain (kaunsa function currently run ho raha hai)

Is tarah hum easily track kar sakte hain ki JavaScript me kaunsa function kab execute ho raha hai.
