<!-- <thead></thead>->to wrap table data
<tbody></tbody>->to wrap table body
<tfoot></tfoot>->to wrap table footer -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantics_in_table</title>
</head>
<body>

    <table border="black">
        <caption>Semantics in Table</caption>
        <!-- theading -->
        <thead>
            <tr>
            <th>Item</th>
            <th>Price</th>
            </tr>
        </thead>
        <!-- tbody -->
        <tbody>
            <tr>
                <td>A</td>
                <td>10</td>
            </tr>

            <tr>
                <td>B</td>
                <td>20</td>
            </tr>

            <tr>
                <td>C</td>
                <td>30</td>
            </tr>
        </tbody>

        <!-- tfooter -->
         <tr>
            <td><b>Sum:</b></td>
            <td>60</td>
         </tr>




    </table>
    
</body>
</html>
