<!-- Recreate the following form using HTML?
hint:
USe the following:
text input for Name
Radio button for sex
give options:India,Nepal,USA,Canada for country
Text Area for message
Checkbox for subscribe
submit button -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment_2_Document</title>
</head>
<body>
    <form action="/server">
    
    <label for="Name">Name:
    <input type="text"id="Name" name="Name"/>
    </label><br><br>

    <label for="sex">Sex:
    <input type="radio" name="sex" id="male"/>
    <label for="male">Male

    <input type="radio" name="sex" id="female"/>
    <label for="female">Female
    <br><br>
    
    <div>Country:
    <select name="country" id="country" >
    <option>Select an option</option>
    <option value="india" >India</option>
    <option value="usa" >USA</option>
    <option value="nepal" >Nepal</option>
    <option value="canada">Canada</option>
    </select>
    </div>
    <br>

    <label for="message">Message:</label><br>
    <textarea name="message" id="message"  rows="4" col="30"></textarea>
    <br><br>

    <input type="checkbox" name="subscribe" id="subscribe">Subscribe?
    <br>
    <br>

    <button type="submit">Submit</button>

    
    
    
    </form>
    
</body>
</html>
