<!-- <table></table>
<caption></caption>->heading of table(or related data that we mention in table)
<tr></tr>->table row
<th></th>->table heading
<td></td>->table data -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table_Document</title>
</head>
<body>
    <table border="black">
        <caption>Food Menu</caption>
        
        <tr>
            <th>Item</th>
            <th>Price</th>
        </tr>

        <tr>
            <td>Frooti</td>
            <td>10</td>
        </tr>

        <tr>
            <td>Samosa</td>
            <td>12</td>
        </tr>

        <tr>
            <td>Chips</td>
            <td>20</td>
        </tr>

        

    </table>
    
</body>
</html>
