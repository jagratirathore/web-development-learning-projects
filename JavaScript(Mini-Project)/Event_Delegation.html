<!-- 
Event Delegation:

Jab hum event listener kisi element par lagate hain, to wo sirf un elements par apply hota hai jo page load ke time exist karte hain.

Agar baad me naye elements dynamically create hote hain, to un par event listener automatically apply nahi hota.

Is problem ko solve karne ke liye hum parent element par event listener lagate hain, jise Event Delegation kehte hain.

Isse existing aur dynamically added dono elements par event work karta hai. -->
