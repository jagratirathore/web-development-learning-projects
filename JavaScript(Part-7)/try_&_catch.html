<!-- #try(kisi bhi code ko test krna ki uske andr error to nhi aa jaayegi jb vo code run krega,jis code pe shak hota h usko try me daalte hm) & catch(try ke andr error aata to catch block run krta h)-The try statement allows you to define a block of code to be tested for errors while it is being executed.
   The catch statement allows you to define a block of code to be executed,if an error occurs in the try block.

   ~Example-
    try{
        console.log(a);
    }catch{
        console.log("variable a doesn't");
    } -->
