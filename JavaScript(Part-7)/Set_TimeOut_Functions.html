<!-- 
#Set Timeout(ye window object ka function hota h): jis kaam ko krne me thoda time lgta -or us kaam ke liye timer set krna hota h ki itne time me hmara kaam ho jaana chaiye ,ye inbuilt function hota h js me 
set Timeout(function,timeout)//function ko hi callback(as a parameter kisi me jata h) bola jata h,timeout -btata h kitne time baad es function ko ececute krana h 5seconds (ye hmesha ms ki terms me hota h,[1000ms=1s])

~Example-
console.log("hi there!");
setTimeout( ()=>{
    console.log("Apna College");
},4000);//4000 means 4s ke baad apna college print krega
console.log("welcome to");

note-APIs call krne ke time use krte hm set timeout function ki itne time me hmari APIs aa jaana chaiye-->
