<!-- Attributes : are used to add more information to the tag ex(<html lang ="en">, type="")-->

<!DOCTYPE html>
<html lang="en"><!-- attribute-->
<head>
    <meta charset="UTF-8"><!-- sb = " "-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attributes</title>
</head>
<body>

    <ul>
        <li>
            Pav
            <ol type="a"><!-- attribute-->
                <li>Circle pav</li>
                <li>Rectangle pav</li>
                <li>Oval pav</li>

            </ol>
        </li>
    </ul>
    <ul>
        <li>
            Bread
            <ol type="1"><!--attribute-->
                <li>Brown Bread</li>
                <li>White Bread</li>
                <li>Sugarfree Bread</li>
            </ol>
        </li>
    </ul>
</body>
</html>
