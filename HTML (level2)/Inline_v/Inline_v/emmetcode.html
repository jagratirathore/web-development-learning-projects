<!-- emmet->it is a shortcut of boilerplate code and in vs code it is automatically have emmet but another application we can download emmet ,we are using short form like ! and enter then it gives overall boilerpalte code of html is called emmet -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emmet</title>
</head>
<body>
    <!-- parent child or nested emmet is-> h > p(it gives emmet abbreviation)  or bhi bhut saare hote h like multiplications->ul>li*5-->
    
    <!-- child: > -->
     <!-- h>p -->
     <h>
        <p> This p(paragraph) child emmet of parent heading(h).</p>
     </h>

     <!-- multiplication: * -->
      <!-- ul>li*10 -->
      <ul>
        <li>1 mul</li>
        <li>2 mul</li>
        <li>3 mul</li>
        <li>4 mul</li>
        <li>5 mul</li>
        <li>6 mul</li>
        <li>7 mul</li>
        <li>8 mul</li>
        <li>9 mul</li>
        <li>10 mul</li>
      </ul>

      <!-- sibling : + -->
       <!-- p>div+img -->
        <p>
            <div>This is my div</div>
            <img src="this i my image.png" alt="no image">
        </p>

</body>
</html>
