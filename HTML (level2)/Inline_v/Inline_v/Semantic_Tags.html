<!-- Semantic tags-
1)<header></header>
2)<footer></footer>
3)<nav></nav>
4)<main></main> 
5)<article></article>->multiple tareke se use kr skte h 
6)<section></section>->(to group together related content)just like span or div tag vhi similar kaam krta h serf name section h.
7)<aside></aside>->related links/content ke sath link krvaane ka kaam krta h  ye(indirectly jo related topic h)


-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Tags</title>
</head>
<body>
    <header>Apna College
    <nav>
        <ul>
            <li><a href="/about.html">About Me</a></li>
            <li><a href="/contact.html">Contact Me</a></li>
        </ul>
    </nav>
    </header>

    <main>This is main Content.</main>
    <footer>I &hearts; coding...</footer>
    </body>
    
</body>
</html>
