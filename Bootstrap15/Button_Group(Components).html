<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="Badge(Components)_css.css">
</head>
<body>
    <!-- button-group-group buttons on a single line  -->
    <h2>Bootstrap Demo</h2>
    <div class="btn-group">
      <button class="btn btn-danger">One</button>
        <button class="btn btn-success">Two</button>
        <button class="btn btn-secondary">Three</button>
    </div><br><br>
   

    <!-- button-group me jese sb (individual button ko bhi de skte h) button ko outline bhi bna skte h -->
    <h2>Bootstrap Demo2</h2>
    <div class="btn-group">
      <button class="btn btn-outline-danger">One</button>
        <button class="btn btn-outline-success">Two</button>
        <button class="btn btn-outline-secondary">Three</button>
    </div><br><br>


   <!-- individual buttons -->
    <h2>Bootstrap Demo3</h2>
    <div class="container">
        <button class="btn btn-danger">One</button>
        <button class="btn btn-success">Two</button>
        <button class="btn btn-secondary">Three</button>
     </div>

     <!-- webiste pe dekho bootstrap ki-getbootstrap cdn,anchar tag ko bhi button bna ke likh skte,mixed styles or outlined bhi kr skte h,checkbox and radio button groups bhi kr skte h -->
    
         <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
