<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="Button(Component)_css.css">

</head>
<body>
<div class="container">
 <!-- base class ki link bhi copy paste kr skte h or class="btn" bhi likh ke bna skte h bootstap me dono same hi h    -->
<button type="button" class="btn">Click Me</button> 

<!-- or ese bhi kr skte h only class="btn" (add->btn-"danger")-->
 <button class="btn btn-primary">btn one!</button>
 <button class="btn btn-secondary">btn two!</button>
 <button class="btn btn-success">btn three!</button>
 <button class="btn btn-danger">btn four!</button>
 <button class="btn btn-warning">btn five!</button>
 <button class="btn btn-info">btn six!</button>
 <button class="btn btn-light">btn seven!</button>
 <button class="btn btn-dark">btn eight!</button>
 <button class="btn btn-link">btn nine!</button>

 
 <!-- hm en sb buttono ka background change bhi kr skte h using normal css-dekho ek kiya h,or uske upr hover krne pe changes smjh aayega jese primary button pe kiya h dekho-->
 
 <!-- outline button bhi kr skte h -direct button ke bich outline add kr ke -->
 <button class="btn btn-outline-danger">btn ten!</button>

 <!-- sizes bhi change kr skte h hm button ka kisi ko large-(class="btn-lg") bna skte kisi ko small(class="btn-sm") bna skte h -->
<button class="btn btn-warning btn-lg">btn eleven!</button>
<button class="btn btn-dark btn-sm">btn twelve!</button>

<!-- agr meko button ko unlickable bnana-to disabled state de skti hu me,class le last me serf (disabled)likh dena h  -->
<button class="btn btn-secondary" disabled>btn unclickable!</button>
 
<!-- anchor tag ko button ki trh diplay kr vaana to(abhi bhi h to anchor tag hi pr button ki trh dikhayenge apn esko,internally pr ye anchor tag hi rhega) -->
 <a href="#" class="btn btn-dark">google Me!</a>

</div>


    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
