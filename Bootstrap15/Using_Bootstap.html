<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap css</title>
    <!-- link-getbootstrap.com se li h -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

     <!-- ye hmari css add ki h hmne after bootstrap link -->
      <link rel="stylesheet" href="Using_Bootstrap_css.css">

      <!-- note-agr phele bootstrap ki file or phir css ki file ki link likhange to style. ke upr override kregi bootstrap file me,or agr phele css then boostrap to bootstap override krta h to hm khud decide krenge ki hmkocustomized krna h ya nhi -->
</head>
<body>

    <!-- with the help of css-webpage pe ek hm hmara normal button bnaayenge -->
    <button>Click Me</button>

    <!-- with the help of bootstrap-webpage pe ek button bnaaoungi bs direct class dedenge class="btn"(phir esko output pe hm click kr ke dekenge to ho  rha hoga click ,or bhi chiz add kr skte hm esme jese or bhi chiz add kr skte h  btn-danger krenge to button red ho jaayega or agr btn-sucess kiya to green color me convert ho jaayega)-->
    <button class="btn ">Click Me</button>
    <button class="btn btn-danger">Click Me</button>
    <button class="btn btn-success">Click Me</button>

    <!-- js link of bootstrap -->
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
