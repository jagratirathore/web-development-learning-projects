<!-- Random Integers: (fixed range me hi number chaiye to hm eska use krte h)jese-From 1 to 10 (random number kbhi bhi 1 ke equal nhi  hota h to 1 se 10 krenge to random nhumber ser 9 tk hi generate honge(range-1 to 9)or 10 generate krane ke liye num+1 krna hota h),at the end integer number chaiye hmko

# generate random integer number -From 1 to 10
Step1:  let num = Math.random(); 
Step2:  num=num*10;  //10 se esliye multiply kr rhe q ki 1 to 10  ke bich hi generate krna chahte hm random number
Step3:  num=Math.floor(num);//decimals hta dega
Step4:  num=num+1; (range-1 to 9)or 10 generate krane ke liye num+1 krna hota h)//-->
