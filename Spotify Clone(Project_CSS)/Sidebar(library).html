<head>

<!-- spotify main website pe ->inspect open krne ke liye ctl+shift+I press kre -->

    <meta charset="UTF-8">

<body>
    <!--1 div create kr rhe  [(main)overall website]ke liye -uske andr,(3 div) for 3 ke liye q ki puri website 3 parts me divide h -sidebar,main-content,music-player -->
    <div class="main">

        <div class="sidebar">
        <!-- esme do parts me divide krenge to do box bnege div ke ek nav,or ek library -->
         <div class="nav">
           <!-- nav-option me do chiz h icon or fir text(anchor tag<a href="#"></a>) -->
            <div class="nav-option" style="opacity:1"><!-- by defult phele se hi opacity fix kr denge apn -->
                <i class="fa-solid fa-house"></i><!--font awesome.com website se(q ki hmne fontawesomecdn link already copy paste kr rakhi h head pe) free icon me ja ke search krenge apne icon ka name or copy paste krenge link copy krenge-->
                <a href="#">Home</a>
            </div>
            <div class="nav-option">
                <i class="fa-solid fa-magnifying-glass"></i><!--font awesome.com website se(q ki hmne fontawesomecdn link already copy paste kr rakhi h head pe) free icon me ja ke search krenge apne icon ka name or copy paste krenge link copy krenge-->
                <a href="#">Search</a>
            </div>
            </div>

         <div class="library">
            <div class="options">
            <div class="lib-option nav-option"><!-- nav-option esliye krenge ku ki jo upr styling  same vo yaha bhi ho -->
                <img src="./assets/library_icon.png">
                <a href="#">Your Library</a>
            </div>
            <div class="icons">
                <i class="fa-solid fa-plus"></i>
                <i class="fa-solid fa-arrow-right"></i>
            </div>
         </div>
         <div class="boxes"></div>
         </div>
     </div>
        <div class="main-content">main-content </div>
        <div class="music-player">music-player</div>
